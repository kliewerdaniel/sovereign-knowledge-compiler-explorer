historical_evolution: Evolved from the original 9-phase Knowledge Compiler (2026-07-11) through the Compile-Time AI taxonomy (2026-07-12) and the Recursive Research Compiler (2026-07-14), landing as a reference implementation that compiles 153 blog posts into 1,513 facts and 436 decisions.
implementation_details: Reference implementation at kliewerdaniel/sovereign-knowledge-compiler — frontend orchestrates extract -> consolidate -> index -> persist -> query, plus a CRDT sync layer and an optional local-LLM deep-synthesis pass.
