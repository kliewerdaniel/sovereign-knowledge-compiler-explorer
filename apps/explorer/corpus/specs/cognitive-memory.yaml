tags: [memory, local-first, sovereign-ai]
what_is_it: Sovereign cognitive memory is a 7-layer local-first memory system (sensory, working, short-term, long-term, semantic, episodic, procedural) that an agent compiles and queries rather than re-deriving each turn.
why_exists: Compile-time memory is the application of compile-time AI to an agent's own state — pay the reasoning cost once, serve cheap lookups forever after.
