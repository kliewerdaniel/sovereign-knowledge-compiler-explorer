what_is_it: The mathematical study of type systems — rules that classify expressions and guarantee certain behaviors before execution.
why_exists: A typed IR (ConceptNode with kind/enums) catches malformed artifacts at compile time, the same way a type system catches bad code. SKCC's SkIR is a strongly-typed IR for agent skills.
